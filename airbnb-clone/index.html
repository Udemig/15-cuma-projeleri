<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb Clone Home Page</title>

    <!-- Fav Icon -->
    <link
      rel="shortcut icon"
      href="./images/airbnb-logo.png"
      type="image/x-icon"
    />

    <!-- Css Link -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- Fontawesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Header -->
    <header>
      <!-- Logo -->
      <a href="#" class="logo">
        <img src="./images/airbnb-logo.png" alt="logo" />
        <span>airbnb</span>
      </a>

      <!-- Navigation -->
      <nav>
        <a href="#">Evler</a>
        <a href="./experience.html">Deneyimler</a>
      </nav>

      <!-- Right -->
      <div class="right">
        <!-- Text -->
        <a href="#" class="home-text">Evinizi Airbnb'ye taşıyın</a>

        <!-- Global Button -->
        <button class="btn">
          <i class="fa-solid fa-globe"></i>
        </button>

        <!-- Profile Button -->
        <a href="./profile.html" class="btn">
          <i class="fa-solid fa-bars"></i>
          <i class="fa-solid fa-user"></i>
        </a>
      </div>
    </header>

    <!-- Filter Section -->
    <section class="filter-section">
      <!-- Filter Item-1 -->
      <div class="filter-item">
        <i class="fa-solid fa-rocket"></i>
        <span>Olağanüstü</span>
      </div>

      <!-- Filter Item-2 -->
      <div class="filter-item">
        <i class="fa-solid fa-star"></i>
        <span>Efsaneler</span>
      </div>

      <!-- Filter Item-3 -->
      <div class="filter-item">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>Satıcılar</span>
      </div>

      <!-- Filter Item-4 -->
      <div class="filter-item">
        <i class="fa-solid fa-water"></i>
        <span>Muhteşem Havuz</span>
      </div>

      <!-- Filter Item-5 -->
      <div class="filter-item">
        <i class="fa-solid fa-fire"></i>
        <span>Popüler</span>
      </div>

      <!-- Filter Item-6 -->
      <div class="filter-item">
        <i class="fa-solid fa-tree"></i>
        <span>Ağaç Evler</span>
      </div>

      <!-- Filter Item-7 -->
      <div class="filter-item">
        <i class="fa-solid fa-caravan"></i>
        <span>Kamp Araçları</span>
      </div>

      <!-- Filter Item-8 -->
      <div class="filter-item">
        <i class="fa-solid fa-umbrella-beach"></i>
        <span>Adalar</span>
      </div>

      <!-- Filter Item-9 -->
      <div class="filter-item">
        <i class="fa-solid fa-mountain"></i>
        <span>Milli Parklar</span>
      </div>

      <!-- Filter Item-10 -->
      <div class="filter-item">
        <i class="fa-solid fa-igloo"></i>
        <span>Üçgen Evler</span>
      </div>

      <!-- Filter Item-11 -->
      <div class="filter-item">
        <i class="fa-regular fa-snowflake"></i>
        <span>Kuzey Kutbu</span>
      </div>

      <!-- Filter Item-12 -->
      <div class="filter-item">
        <i class="fa-solid fa-image"></i>
        <span>Güzel Manzaralar</span>
      </div>

      <!-- Filter Item-13 -->
      <div class="filter-item">
        <i class="fa-solid fa-compass-drafting"></i>
        <span>Tasarım</span>
      </div>

      <!-- Filter Button -->
      <div class="filter-button">
        <i class="fa-solid fa-sliders"></i>
        <span>Filtreler</span>
      </div>
    </section>
  </body>
</html>
